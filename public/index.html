<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copa do Mundo - Monte Seu Time</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>🏆 Copa do Mundo - Monte Seu Time</h1>

      <div class="busca-container">
        <input
          type="text"
          id="busca"
          placeholder="Digite o nome de um jogador..."
        />

        <button onclick="buscarJogador()">Buscar</button>
      </div>
    </header>

    <main>
      <!-- RESULTADOS -->
      <section>
        <div class="titulo-secao">
          <h2>🔎 Resultados da Busca</h2>
        </div>

        <div id="resultados"></div>
      </section>

      <!-- MEU TIME -->
      <section>
        <div class="titulo-secao">
          <h2>⚽ Meu Time (<span id="contadorMeuTime">0</span>/11)</h2>

          <div>
            <label for="formacao"> Formação: </label>

            <select id="formacao" onchange="desenharCampo()">
              <option value="433">4-3-3</option>

              <option value="442">4-4-2</option>

              <option value="352">3-5-2</option>
            </select>
          </div>
        </div>

        <!-- CAMPO TÁTICO -->
        <div id="campo">
          <!-- O JavaScript irá desenhar o campo aqui -->
        </div>
      </section>

      <!-- HISTÓRICO -->
      <section>
        <div class="titulo-secao">
          <h2>🕘 Histórico de Buscas</h2>
        </div>

        <ul id="historico"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
